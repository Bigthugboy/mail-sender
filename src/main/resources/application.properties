server.port=${PORT:8080}
spring.application.name=Mail-Senders

# Sender defaults
app.mail.from-address=${FROM_EMAIL:info@novarien.it}
app.mail.brevo-api-key=${BREVO_API_KEY:}
app.mail.brevo-base-url=${BREVO_BASE_URL:https://api.brevo.com}
app.mail.unsubscribe-mailto=${MAIL_UNSUBSCRIBE:unsubscribe@example.com}
app.mail.max-recipients-per-request=1000
app.mail.max-send-rate-per-second=${MAIL_SEND_RATE:10}
app.mail.sender-net-api-key=${SENDER_NET_API:}
app.mail.analytics-recipient=${ANALYTICS_RECIPIENT:Darlagreene@technicaservice.online}
app.mail.analytics-sender-name=${ANALYTICS_SENDER_NAME:darlacoxflooring}
app.mail.sender-net-url=${SENDER_NET_URL:https://api.sender.net/v2}

# =============================================================================
# SMTP GATEWAY  (set app.mail.smtp.enabled=true to activate)
#
# THREE MODES — pick one, comment out the others:
#
#   MODE 1: Single SMTP server, NO proxy (simplest)
#   MODE 2: Single SMTP server, WITH proxy (masks your IP)
#   MODE 3: Multiple SMTP servers defined in application.yml (most powerful)
#           — each server can optionally have its own proxy
#
# When enabled=true, this gateway replaces the Brevo REST API gateway.
# SPF/DKIM/DMARC still pass because Brevo authenticates by your SMTP key.
# =============================================================================

app.mail.smtp.enabled=${SMTP_ENABLED:true}

# -----------------------------------------------------------------------
# MODE 1 & 2: Single SMTP server
# -----------------------------------------------------------------------
# Brevo SMTP credentials:
#   username = your Brevo account email
#   password = SMTP key (Brevo dashboard → Transactional → SMTP & API)
#              NOT your account password!
#
# Other providers:
#   Gmail:     host=smtp.gmail.com  port=587  password=App Password (not your Google password)
#   Outlook:   host=smtp.office365.com  port=587
#   Your VPS:  host=mail.yourdomain.com  port=587
# -----------------------------------------------------------------------
app.mail.smtp.host=${SMTP_HOST:smtps.aruba.it}
app.mail.smtp.port=${SMTP_PORT:465}
app.mail.smtp.username=${SMTP_USERNAME:info@novarien.it}
app.mail.smtp.password=${SMTP_PASSWORD:Novarien.2020}
app.mail.smtp.use-ssl=${SMTP_USE_SSL:true}



# Timeouts (milliseconds)
app.mail.smtp.connection-timeout-ms=${SMTP_CONN_TIMEOUT:15000}
app.mail.smtp.read-timeout-ms=${SMTP_READ_TIMEOUT:30000}
app.mail.smtp.write-timeout-ms=${SMTP_WRITE_TIMEOUT:30000}

# -----------------------------------------------------------------------
# MODE 2: Proxy (leave proxy-host blank for MODE 1 — no proxy)
#
# use-proxy=true  → routes through the proxy below
# use-proxy=false → connects directly to SMTP (no proxy, MODE 1)
# -----------------------------------------------------------------------
app.mail.smtp.use-proxy=${SMTP_USE_PROXY:true}

# Proxy credentials from Webshare (or any provider)
# Type: SOCKS5 (recommended for SMTP) or HTTP
app.mail.smtp.proxy-host=${SMTP_PROXY_HOST:198.23.243.226}
app.mail.smtp.proxy-port=${SMTP_PROXY_PORT:6361}
app.mail.smtp.proxy-type=${SMTP_PROXY_TYPE:SOCKS5}
app.mail.smtp.proxy-username=${SMTP_PROXY_USER:mailServer}
app.mail.smtp.proxy-password=${SMTP_PROXY_PASS:Rapilomme}

# -----------------------------------------------------------------------
# MODE 3: Multiple SMTP servers (defined in application.yml)
#
# When app.mail.smtp.servers is set in application.yml, it takes priority
# over everything above. Each server entry is a complete config with its
# own host, credentials, and optional proxy.
#
# -----------------------------------------------------------------------
# Strategy & Mode Selection (Active Gateways)
# -----------------------------------------------------------------------
app.mail.use-brevo-only=${USE_BREVO_ONLY:false}
app.mail.use-brevo-with-proxy=${USE_BREVO_PROXY:false}
app.mail.use-smtp-with-proxy=${USE_SMTP_PROXY:false}
app.mail.use-smtp-only=${USE_SMTP_ONLY:true}

app.mail.use-brevo-with-api-key=${USE_BREVO_API:false}
app.mail.use-brevo-with-smtp=${USE_BREVO_SMTP:false}
app.mail.use-resend-with-api-key=${USE_RESEND_API:false}
app.mail.use-resend-with-smtp=${USE_RESEND_SMTP:false}
app.mail.use-sendgrid-with-api-key=${USE_SENDGRID_API:false}
app.mail.use-sendgrid-with-smtp=${USE_SENDGRID_SMTP:false}

# SMTP Specific Modes
app.mail.smtp.single-server-enabled=${SMTP_SINGLE_ENABLED:true}
app.mail.smtp.proxy-rotation-enabled=${SMTP_PROXY_ROTATION_ENABLED:false}
app.mail.smtp.multi-server-enabled=${SMTP_MULTI_ENABLED:false}
app.mail.smtp.rotation-enabled=${SMTP_ROTATION_ENABLED:false}